server {
    listen 80;
    server_name localhost;  # replaced with your domain on the droplet

    # Health check endpoints
    location /health {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward all API requests to the FastAPI app container
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Forward static files (avatars, etc.) to the app container
    location /static/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
    }

    # Forward docs endpoints (FastAPI auto-generated)
    location /docs {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
    }
}
