services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: thefray
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: thefray_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thefray -d thefray_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000" # localhost only — nginx on host proxies to this
    environment:
      DATABASE_URL: postgresql://thefray:${DB_PASSWORD}@db:5432/thefray_dev
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      NEWSAPI_URL: https://newsapi.org/v2/everything
      CORS_ORIGINS: ${CORS_ORIGINS}
      API_PREFIX: /api/v1
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: production
    volumes:
      - static_files:/app/static
    networks:
      - backend

volumes:
  postgres_data:
  static_files:

networks:
  backend:
    driver: bridge
